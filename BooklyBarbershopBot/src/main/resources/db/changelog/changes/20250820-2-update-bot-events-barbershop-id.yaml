databaseChangeLog:
  - changeSet:
      id: 20250820-2
      author: eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - and:
            - tableExists:
                tableName: bot_events
            - columnExists:
                tableName: bot_events
                columnName: barbershop_id
      changes:
        # 1. Удаляем старую колонку (если существует и тип неправильный)
        - dropColumn:
            tableName: bot_events
            columnName: barbershop_id
            # но dropColumn может упасть, если колонка используется → осторожно!
            # лучше использовать precondition на columnExists + тип, но это сложно
            # поэтому можно оставить, но с осторожностью

        # 2. Добавляем новую с правильным типом
        - addColumn:
            tableName: bot_events
            columns:
              - column:
                  name: barbershop_id
                  type: UUID
                  constraints:
                    nullable: false

        # 3. Индекс — отдельный precondition
  - changeSet:
      id: 20250820-2-index
      author: eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - indexExists:
                indexName: idx_bot_events_shop_type
                tableName: bot_events
      changes:
        - createIndex:
            indexName: idx_bot_events_shop_type
            tableName: bot_events
            columns:
              - column:
                  name: barbershop_id
              - column:
                  name: event_type