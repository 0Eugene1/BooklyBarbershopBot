databaseChangeLog:
  - changeSet:
      id: 2
      author: Eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - columnExists:
                tableName: barbershop
                columnName: about_text
      changes:
        - addColumn:
            tableName: barbershop
            columns:
              - column:
                  name: about_text
                  type: TEXT
                  constraints:
                    nullable: true