databaseChangeLog:
  - changeSet:
      id: 20250827-barbershop-users
      author: Eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - tableExists:
                tableName: barbershop_users
      changes:
        - createTable:
            tableName: barbershop_users
            columns:
              - column:
                  name: barbershop_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
      # primary key лучше вынести отдельным change (см. ниже), но если хочешь оставить здесь — можно
      # но в твоём варианте primaryKey стоит внутри createTable — это тоже работает