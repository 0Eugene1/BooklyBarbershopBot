databaseChangeLog:
  - changeSet:
      id: 3
      author: Eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - columnExists:
                tableName: barbershop
                columnName: reviews_url
      changes:
        - addColumn:
            tableName: barbershop
            columns:
              - column:
                  name: reviews_url
                  type: VARCHAR(500)
