databaseChangeLog:
  - changeSet:
      id: 20250822-1
      author: eugene
      preConditions:
        - onFail: MARK_RAN
        - onError: MARK_RAN
        - not:
            - columnExists:
                tableName: booking
                columnName: barbershop_id
      changes:
        - addColumn:
            tableName: booking
            columns:
              - column:
                  name: barbershop_id
                  type: uuid
                  constraints:
                    nullable: true