databaseChangeLog:
  - changeSet:
      id: 20260121-3-add-fields-booking
      author: eugene
      comment: Добавление end_time, total_duration_minutes и временное изменение типа status
      changes:
        - addColumn:
            tableName: booking
            columns:
              - column:
                  name: end_time
                  type: timestamptz
                  constraints:
                    nullable: true


        - addColumn:
            tableName: booking
            columns:
              - column:
                  name: total_duration_minutes
                  type: integer
                  constraints:
                    nullable: true


        - modifyDataType:
            tableName: booking
            columnName: status
            newDataType: VARCHAR(50)


      rollback:
        - dropColumn:
            tableName: booking
            columnName: end_time
        - dropColumn:
            tableName: booking
            columnName: total_duration_minutes
        - modifyDataType:
            tableName: booking
            columnName: status
            newDataType: VARCHAR(20)